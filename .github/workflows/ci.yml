name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

permissions:
  contents: read

jobs:
  quality-gate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup mise
        uses: jdx/mise-action@v3
        with:
          install: true
          cache: true

      - name: Setup Biome
        uses: biomejs/setup-biome@v2
        with:
          working-dir: frontend

      - name: Frontend format check
        run: biome check --linter-enabled=false --assist-enabled=false frontend

      - name: Frontend lint
        run: biome lint frontend

      - name: Install frontend dependencies
        run: npm -C frontend ci

      - name: Frontend build gate
        run: npm -C frontend run build

      - name: Go unit tests
        run: go test ./...

      - name: Go lint
        uses: golangci/golangci-lint-action@v8
        with:
          install-mode: none

      - name: Engine coverage gate (>= 70%)
        run: |
          go test ./internal/engine -coverprofile=engine.cover.out
          COVERAGE="$(go tool cover -func engine.cover.out | awk '/^total:/{gsub(/%/,"",$3); print $3}')"
          echo "internal/engine coverage: ${COVERAGE}%"
          awk -v coverage="${COVERAGE}" 'BEGIN { exit (coverage + 0 >= 70 ? 0 : 1) }'
